    <!-- Flower -->
    <circle cx="0" cy="-25" r="8" fill="#FFD700"/>
    <circle cx="-6" cy="-30" r="4" fill="#FF69B4"/>
    <circle cx="6" cy="-30" r="4" fill="#FF69B4"/>
